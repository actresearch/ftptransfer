services:
  ftptransfer:
    image: ghcr.io/actresearch/ftptransfer:${IMAGE_TAG:-latest}
    container_name: ftptransfer
    restart: unless-stopped
    env_file:
      - .env
    environment:
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      FLASK_HOST: 0.0.0.0
      FLASK_PORT: ${FLASK_PORT:-5000}
    ports:
      - "${FLASK_PORT:-5000}:5000"
    volumes:
      - ${MOUNTS_ROOT:-/home/actserver/mounts}:${MOUNTS_ROOT:-/home/actserver/mounts}
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/healthz')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    labels:
      com.centurylinklabs.watchtower.enable: "true"

  redis:
    image: redis:7-alpine
    container_name: ftptransfer-redis
    restart: unless-stopped
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  watchtower:
    image: containrrr/watchtower:latest
    container_name: ftptransfer-watchtower
    restart: unless-stopped
    profiles: ["ops"]
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command:
      - --label-enable
      - --interval
      - "300"
