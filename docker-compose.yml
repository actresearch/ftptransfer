services:
  ftptransfer:
    image: ghcr.io/actresearch/ftptransfer:${IMAGE_TAG:-latest}
    container_name: ftptransfer
    restart: unless-stopped
    environment:
      O365_CLIENT_ID: ${O365_CLIENT_ID:-}
      O365_CLIENT_SECRET: ${O365_CLIENT_SECRET:-}
      O365_TENANT_ID: ${O365_TENANT_ID:-}
      MAILBOX_USER: ${MAILBOX_USER:-jrobinson@actresearch.net}
      COMPLETED_FOLDER: ${COMPLETED_FOLDER:-CompletedAutomations}
      MOUNTS_ROOT: ${MOUNTS_ROOT:-/home/actserver/mounts}
      TOKEN_PATH: ${TOKEN_PATH:-/home/actserver/mounts/token}
      TOKEN_FILENAME: ${TOKEN_FILENAME:-my_token.txt}
      JSON_REPORTS_PATH: ${JSON_REPORTS_PATH:-/home/actserver/mounts/json/Reports}
      PRELIMS_PATH: ${PRELIMS_PATH:-/home/actserver/mounts/prelims}
      SCRIPTS_PATH: ${SCRIPTS_PATH:-/home/actserver/mounts/mlp}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      FLASK_HOST: 0.0.0.0
      FLASK_PORT: ${FLASK_PORT:-5000}
      AUTH_CHECK_INTERVAL: ${AUTH_CHECK_INTERVAL:-300}
      STREAM_POLL_INTERVAL: ${STREAM_POLL_INTERVAL:-60}
    ports:
      - "${FLASK_PORT:-5000}:5000"
    volumes:
      - ${MOUNTS_ROOT:-/home/actserver/mounts}:${MOUNTS_ROOT:-/home/actserver/mounts}
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/healthz')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    labels:
      com.centurylinklabs.watchtower.enable: "true"

  redis:
    image: redis:7-alpine
    container_name: ftptransfer-redis
    restart: unless-stopped
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  watchtower:
    image: containrrr/watchtower:latest
    container_name: ftptransfer-watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command:
      - --label-enable
      - --cleanup
      - --rolling-restart
      - --interval
      - "300"
